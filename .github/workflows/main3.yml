name: Run PowerShell Script

# 設定觸發條件：當有人 push 代碼到 main 分支時執行
on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # 這可以讓你手動點擊按鈕執行

jobs:
  build:
    # 指定執行的環境，windows-latest 自帶完整 PowerShell 環境
    runs-on: windows-latest

    steps:
      # 1. 將你的代碼從 GitHub 檢出（Checkout）到這台雲端電腦上
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 執行你的 PowerShell 腳本
      - name: Run my script
        shell: pwsh
        run: |
          ./UIStore_Installer.ps1

      - name: Upload Generated Project
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-core-8-project  # 下載時的壓縮檔檔名
          path: ./         # 這裡填寫你 PS1 腳本中產生的資料夾路徑
          # 如果你不確定資料夾名稱，可以用 ./ 表示上傳整個工作區
