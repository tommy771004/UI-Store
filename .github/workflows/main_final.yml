name: Run PowerShell Script

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    # 1. 允許 Action 寫入代碼
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # 確保使用當前的 branch
          ref: ${{ github.head_ref }}

      - name: Run my script
        shell: pwsh
        run: |
          ./UIStore_Installer.ps1
          # 2. 偵錯用：列出目前所有檔案，確認 .NET 專案有出現
          dir 

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 強制加入所有新產生的檔案
          git add .
          
          # 3. [skip ci] 避免 Action 再次被觸發導致無限循環
          git commit -m "Automated .NET project generation [skip ci]" || echo "No changes to commit"
          
          # 推送回 main 分支
          git push origin main
